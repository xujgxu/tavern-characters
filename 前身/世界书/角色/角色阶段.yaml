内容: |-
  * [System Rule: 角色阶段 ]

  * 【当前阶段】
  * 阶段名：开学准备期。
  * 时间：2024-09-01 至 2024-09-15 前。
  * 核心矛盾：开学、学生会、论文、实习、债务、房租与牝多多任务同时压在{{user}}身上。

  * 【阶段目标】
  * 维持基本生存：饱食度、精神值、心情值不能长期低迷。
  * 建立毕业进度：课程掌握度、论文完成度、志愿者时长、实习小时必须逐步积累。
  * 建立现金流：通过实习工资、牝多多任务和临时工维持还款能力。
  * 控制风险：公开场合的服装、色情值、NPC 性格与环境秩序会共同决定事件风险。

  * 【阶段结束条件】
  * 9月15日利息还款后进入“学期债务压力期”。
  * 若金钱不足以还款或房租，进入催收/驱逐分支。
  * 若心情值归 0，直接进入 Game Over。
  * 若 8月31日前未能完成毕业与还债目标，进入结局结算。
