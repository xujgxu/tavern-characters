---
内容: |-
    * [地点：海平市·北部学区·海平大学]


    * 【区域概述】

    * 名称：海平大学

    * 定位：顶尖学府与青春舞台

    * 地理位置：北部学区

    * 氛围：全市最负盛名的高等学府，兼具学术严谨与青春活力。校园内阶级差异与隐秘规则并存，表面的光鲜下涌动着各色欲望与交易。


    * 【校园设施详情】

    * 【行政与学生活动中心（行政楼）】
    * 坐落于校园中轴线上的地标性建筑。外观庄严宏伟，大理石外墙在阳光下显得肃穆，门前设有巨大的喷泉广场。
    * 四至六层（教职工办公区）：设有能容纳4-8名教师的学科大办公室、资深教授专属的独立办公室、堆满文件的档案室以及教职工会议室。
    * 一至三层（社团与学生会）：大部分社团的活动室集中于此，出于管理需要，仅有社长和指导老师持有钥匙。学生会专属会议室位于三楼走廊尽头，内部配有宽大的实木办公桌、一组柔软的待客沙发以及可调节视野的百叶窗。这里是学生会每周例会的场所，仅有正副主席（包含{{user}}）和部分行政老师拥有该房间的钥匙。

    * 【海大综合体育馆】
    * 采用现代流线型设计与大面积蓝色玻璃幕墙的巨型场馆，内部空间极其开阔，采光极佳。
    * 标准恒温游泳馆：内含一个50米标准恒温泳池、宽敞的男女淋浴间和更衣室。出于安全管控，除日常教学和游泳队固定活动时间外，大门均处于上锁状态。
    * 综合运动区：包含室内篮球馆、羽毛球场、乒乓球场，以及堆满垫子、跳箱和球类的综合体育器材仓库。

    * 【核心图书馆】
    * 高达六层的现代化建筑，外立面由巨大的隔音玻璃构成，是全校最安静、学术氛围最浓厚的神圣之地。
    * 藏书区：每层楼都整齐排列着高大密集、一眼望不到头的金属书架。
    * 公共自习大厅：宽广的开放空间。学生们自觉分散在长条桌前全神贯注地学习，每逢期末考试季，这里就会变得热门。
    * 独立小自习室：需要刷校园卡计时消费的私密小房间。隔音效果极佳，木门上仅有一块狭长的透明玻璃用于外部查岗。内部配有书桌和电源插座，是考研党和校园情侣们最爱抢占的隐秘空间。

    * 【学生宿舍区】
    * 实行严格的门禁与男女分栋管理。海平大学的住宿条件极为优越，均为双人寝室，配有独立卫浴和上床下桌。
    * {{user}}的现状：{{user}}在女生宿舍拥有一间属于自己的双人寝室，室友是一名作息规律的普通乖乖女。但由于极度注重隐私且方便通勤，{{user}}目前已搬出学校，租住在校外的"绿洲景苑小区"。这张宿舍的床铺，现在仅仅作为她中午偶尔午休、或换洗衣服的"临时落脚点"。

    * 【海大综合食堂】
    * 位于宿舍区与教学区交界处的三层大型环形建筑，每到饭点便人声鼎沸，散发着浓郁的饭菜香气。
    * 一、二层（大众餐厅）：提供各类平价快餐与地方小吃。空间开阔但餐桌摆放极其密集。在中午和傍晚的用餐高峰期会涌入大量学生。
    * 三层（教工与特色餐厅）：环境相对清幽，提供点餐服务与精致菜肴。四周设有带屏风或半高隔断的卡座，通常是情侣或教职工聚餐的首选之地。

    * 【其它常见配套设施】






    * 【关键事件节点】

    * 【新生报到日（9月初）】 新生涌入，校园内人流量暴涨。学生会组织迎新活动，{{user}}作为副主席需要全程参与接待。大量陌生面孔进入校园，是潜在的"目标接触"与"曝光风险"高发期。
    * 【运动会（10月中）】 全校性体育盛会，{{user}}作为游泳队队长需要组织参赛。运动员休息区更衣频繁、人员流动大，且赛后运动员体力透支，警惕性降低，是各类意外与预谋事件的温床。
    * 【论文开题与中期检查（11月-次年3月）】 与导师单独沟通的高频期，每次会面都可能成为教授施加压力的时机。开题报告不过或中期检查不通过将直接影响毕业。
    * 【毕业季（5-6月）】 论文定稿、答辩、离校手续集中期。学生会工作交接、社团注销、宿舍退宿等事务叠加，{{user}}时间极度紧张，容易在各种压力下做出妥协。
    * 【泳队训练日（每周二四六晚上）】 固定训练时段。训练后更衣室、淋浴间、桑拿房的使用频率高，且陈教练离职前后的过渡期可能出现新教练或临时负责人，带来不确定因素。
    * 【图书馆占座季（考试前一个月）】 考研和期末备考期间，图书馆座位争夺激烈。凌晨占座、通宵自习成为常态，深夜独行的风险显著增加。


    * 【特殊机制/动作】

    * 【食堂就餐】
    * 触发：在海大综合食堂一二层点餐。
    * 消耗：金钱 -20至40元 (随机浮动)；耗时 30分钟。
    * 效果：饱食度 +40。

    * 【寝室午休】
    * 触发：在学生宿舍区自己的床铺上休息。
    * 效果：精神值 +6 / 小时（因室友存在或环境限制，恢复效果低于校外租房）。


    * 【交通连接】

    * 可前往：海平职业技术学院、海平中心世纪公园、星海综合购物中心
    * 可搭乘：地铁1号线、地铁2号线、101路、104路
