---
内容: |-
    * [地点：海平市·东部商业区·星海综合购物中心]


    * 【基本信息】

    * 名称：星海综合购物中心
    * 位置：东部商业区
    * 性质：巨型商业综合体，东部商业区地标，按功能区域划分人流与活动场景

    * 【建筑特征】

    * 位于东部商业区核心地段，外观为波浪形玻璃幕墙，夜间灯光变幻如同海浪。
    * 共7层，内部不再按单纯楼层介绍，而是划分为服装区、电玩区、影院区、餐饮休息区、家居数码区和地下停车接驳区。
    * 地下三层为停车场与地铁接驳通道，周末和节假日客流极大。
    * 服装区、电玩区、影院区和餐饮休息区是{{user}}最常停留的区域，也是露出、换装、约会和偶遇事件最集中的场景。

    * 【楼层空间】

    * 地下停车接驳区：B1-B3，停车场、地铁接驳通道和临时促销区，连接地铁1号线与3号线出口。
    * 服装区：1F-4F，覆盖国际奢侈品牌、轻奢服饰、快时尚、运动户外、内衣家居和精品配饰。试衣间数量最多，导购服务细致，适合购买衣物、换装、整理造型和短暂独处。
    * 生活用品区：5F，家居用品、数码配件、书店等，客流相对分散，适合补充日常用品或短暂停留。
    * 电玩区：6F东侧，电玩城、VR体验、抓娃娃机和节奏音游区，年轻人和情侣较多，嘈杂、明亮、适合消磨时间。
    * 影院区：6F西侧，IMAX影院、普通影厅、情侣厅和小型展览区，适合约会、休闲、短暂停留或避开人群。
    * 餐饮休息区：7F，室内美食广场与屋顶花园，餐饮选择多，是购物间隙休息、补妆、吃东西和恢复体力的常用区域。

    * 【特殊说明】

    * 常规购物耗时、饱食度、精神值、体力等变化，按各自基础规则正常结算，不在此重复。
    * 周末、节假日和晚间人流极大，特别是服装区、电玩区、影院区、餐饮休息区和地下停车接驳区。
    * 服装区试衣间内部无监控，部分老旧试衣间门锁松动，适合换装、整理衣物、露出展示或短暂独处。
    * 部分品牌导购对{{user}}这类漂亮女生格外热情，会主动推荐尺码、搭配、会员折扣或试穿方案。
    * 购物中心对客人的隐私需求相对配合，但公共区域仍有常规安保和监控；影院、电玩区和餐饮休息区更适合自然制造半公开场景。

    * 【特殊机制/动作】
    * 餐饮休息区用餐：金钱 -40至80；耗时30分钟；饱食度 +40。
    * 影院区看电影：金钱 -50；持续2小时；心情值 +20。
    * 电玩区游玩：金钱 -50/小时；心情值 +15/小时。
    * 服装区购物或换装：金钱按商品价格结算；心情值+（消耗金钱/20）。

    * 【交通连接】

    * 可前往：夜色成人用品店、海平大学、海平中心世纪公园、远洋环球物流仓储中心
    * 可搭乘：地铁1号线、地铁3号线、101路、102路
