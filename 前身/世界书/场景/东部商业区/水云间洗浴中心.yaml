内容: |-
    * [地点：海平市·东部商业区·水云间洗浴中心]


    * 【基本信息】

    * 名称：水云间洗浴中心
    * 位置：东部商业区
    * 性质：大型高端洗浴综合体


    * 【建筑特征】

    * 位于东部商业区繁华地段，主打日式温泉、休闲水疗与24小时休息服务。
    * 实行“一票制”入场，门票200元，单次入场最多可停留24小时。
    * 这里是富商、白领招待客户、放松身心的首选场所，内部按楼层逐步提高私密性。


    * 【楼层空间】

    * 1F：室内外温泉与更衣区。水雾弥漫，视线模糊，空气中混合硫磺与沐浴露气味；洗浴中心提供白色浴巾包裹身体。男女分浴汤池按性别严格划分，露天混浴温泉面积最大，适合情侣或结伴男女。
    * 楼层过渡：浴衣换装区。顾客离开1F温泉区前往2F前，必须强制换上洗浴中心提供的日式浴衣；浴衣采用交领右衽设计，仅靠一根腰带束缚。
    * 2F：免费自助与多元休闲区。灯光偏暗，氛围慵懒，顾客均穿宽松日式浴衣自由活动；含海鲜自助餐厅、暗场影院、桌游吧和室内帐篷营地。
    * 3F：绝对私密客房与付费理疗区。走廊铺厚重静音地毯，房间隔音极佳，配有可反锁木门；标准私密客房可免费休息，足浴、精油推背、全身理疗等服务需额外付费。


    * 【特殊说明】

    * 常规游玩耗时、饱食度、精神值、体力等变化，按各自基础规则正常结算，不在此重复。
    * 门票包含温泉、更衣、2F免费自助、公开休息区和3F标准客房休息。
    * 2F暗场影院光线极暗，沙发床可平躺；桌游区适合社交；室内帐篷营地无门锁，仅用布帘虚掩。
    * 3F付费理疗区私密性极高，适合熟睡、商务接待或长时间休息。
    * 洗浴中心对客人的隐私需求高度配合，不问来历、不查身份。


    * 【特殊机制/动作】

    * 购买入场门票：金钱 -200。
    * 泡温泉：门票内免费；心情值 +5/小时。
    * 自助餐：门票内免费；饱食度 +2/分钟。
    * 看电影：门票内免费；心情值 +2/小时。
    * 3楼休息：标准私密客房免费使用；精神值 +12/小时。
    * 额外服务-足浴：金钱 -150；持续1小时；心情值 +20。
    * 额外服务-精油推背：金钱 -250；持续1小时；心情值 +40。
    * 额外服务-全身理疗：金钱 -300；持续2小时；心情值 +60。
    * 额外服务-性服务（仅男顾客可享受）：金钱 -500；持续2小时；心情值 +100。

    * 【交通连接】

    * 可前往：维纳斯情侣酒店、极乐世界娱乐城
    * 可搭乘：地铁1号线、101路、102路
