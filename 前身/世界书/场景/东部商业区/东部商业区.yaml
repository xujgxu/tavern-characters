    * 极乐世界娱乐城：综合性夜生活枢纽，包含夜店、酒吧和KTV。

    * 夜色成人用品店：售卖成人用品和情趣商品的专门店，灯光昏暗，氛围私密。

    * 维纳斯情侣酒店：提供钟点房和主题客房的情趣酒店。
