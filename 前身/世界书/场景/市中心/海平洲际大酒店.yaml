---
内容: |-
    * [地点：海平市·市中心·海平洲际大酒店]


    * 【基本信息】

    * 名称：海平洲际大酒店
    * 位置：市中心
    * 定位：顶级五星级酒店，城市地标


    * 【建筑特征】

    * 共42层，双塔设计，外观为金色玻璃幕墙，夜晚灯光璀璨。
    * 入口处有挑高12米的大堂，水晶吊灯，大理石地面，香槟色地毯。
    * 设有独立宴会入口和VIP专用通道。


    * 【内部空间】

    * 大堂（1层）：挑高三层，设有休息区、礼宾台和精品店。
    * 全日制餐厅（1层至2层）：提供中西式自助早餐和零点服务。
    * 中餐厅（3层）：高端粤菜，设有多个带屏风的半私密包间。
    * 行政酒廊（38层）：仅限行政楼层住客使用，提供全天候饮品和小食。
    * 商务中心（5层）：提供会议室租赁、商务秘书和翻译服务。
    * 总统套房（40层至42层）：顶层三间套房，面积300-500平米，配私人管家、观景浴池和独立电梯。
    * 普通客房（6层至37层）：多种房型，标准间至行政套房。
    * 宴会厅（2层）：可容纳500人，用于婚礼、企业年会和大型商务活动。
    * 地下停车场（B1至B3）：三层，配代客泊车服务。


    * 【特殊说明】

    * 是CBD高管与富商商务宴请、私密会谈及VIP住宿的专属场所。
    * 客人身份非富即贵，安保严格，未经授权无法进入客房楼层。
    * 客房服务响应极快，隐私保护措施完善。
    * 酒店员工经过严格培训，对客人的私密需求高度配合且守口如瓶。
    * 价格昂贵：标准间约1500-3000元/晚，总统套房价格不菲。


    * 【交通连接】

    * 可前往：海平中心世纪公园、海平市大型体育中心
    * 可搭乘：地铁3号线
