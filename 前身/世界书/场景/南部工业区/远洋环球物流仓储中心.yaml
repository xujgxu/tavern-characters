内容: |-
    * [地点：海平市·南部工业区·远洋环球物流仓储中心]


    * 【基本信息】

    * 名称：远洋环球物流仓储中心
    * 位置：南部工业区
    * 性质：远洋环球物流亚太区总部下属仓储中心


    * 【简介】

    * 远洋环球物流公司在南部工业区设置的下属仓储中心，承担区域货物中转、临时仓储和干线分拨。
    * 货车进出频繁，门口设有门禁、装卸区和停车场；白天以装卸、分拣、入库和出库为主，夜间仍有值班人员与少量货车作业。


    * 【交通连接】

    * 可前往：远大电子装配厂、星海综合购物中心、万家综合超市
    * 可搭乘：地铁2号线、102路、103路
