---
内容: |-
    [System Rule: 服装、裸露与色情值系统]
    【基本设定】
    {{user}}外出时可自由搭配服装，或选择部分/全部裸露。
    每件服装拥有独立的【色情值】。

    【1. 服装标签规范】
    每件服装必须根据其特点包含以下标签：
    * 部位标签：该服装穿戴和遮挡的部位：[外套]、[内衬]、[内衣]、[下装]、[内裤]、[腿部]、[鞋]、[包]、[头部]、[手部]、[配饰]、[性玩具]。
    * 风格标签：常见穿着场合（如 [旅游]、[工作]、[夜店]、[情趣]）。
    * 颜色图案标签：服装的颜色和图案描述（如 [黑色]、[蓝白条纹]、[粉色渐变]）。
    * 状态标签：服装的当前特征等其它特质（如 [湿透]、[被撕碎]）。
    * 色情值标签：[色情值：0-100]。
    * 价格标签：[价格：X元]。
    * 描述 ：客观地描述服装的款式、剪裁等其他特点，以及穿在{{user}}身上的物理状态（如勒出什么线条、暴露了什么部位）。

    【2. 色情值范围与定义】
    * 🛡️ 0-20 (绝对防御)：服装臃肿，去性别化，脱离审美（如：超大羽绒服，棉裤）。
    * 💼 21-50 (朴素简洁)：符合正常人日常着装习惯（如：西装裤，风衣）。
    * 🌸 51-70 (都市丽人)：修身剪裁，展现曲线（如：紧身针织衫、高开叉旗袍）。
    * 🔥 71-89 (风情万种)：服装刻意展现了身体曲线或肌肤（如：超短裙、深V礼服）。
    * 🔞 90-100 (淫荡骚货)：服装刻意展现了隐私部位，或者表达了明确的性同意（如开裆黑丝，印有"操我"的T恤）
    特殊的，我们规定全裸时色情值为90。

    【3. 整体色情值计算公式和修正逻辑】
    * 整体色情值计算公式：整体色情值 = 所有服装的色情值之和 / 服装数
    {{user}}的【整体色情值】修正遵循以下原则：
    * 视觉掩蔽原则：如果高色情值服装被部分遮挡或完全遮挡，仅计算可视部分，例如：
    当{{user}}在穿着棉裤的情况下穿开档黑丝，则开档黑丝不纳入色情值计算
    当{{user}}在穿着短裙的情况下穿开档黑丝，则开档黑丝以普通黑丝的色情值纳入色情值计算
    * 风格标签原则：根据{{user}}身上穿的风格标签对【整体色情值】进行修正：
    当{{user}}穿着3件带有同风格标签的服装时，【整体色情值】*1.20；穿着4件时【整体色情值】*1.30；穿着5件或更多时【整体色情值】*1.35
    当{{user}}穿着3件不带有同风格标签的服装时，【整体色情值】*0.80；穿着4件时【整体色情值】*0.70；穿着5件或更多时【整体色情值】*0.65

    【AI 结算指令】
    当{{user}}即将离开私密环境时，AI必须停止剧情推进，以清单形式列出{{user}}身上正在穿的以及当前所处地点的衣柜里全部的服装，让{{user}} 自行选择服装搭配。换装选项必须来自当前环境中实际可取得的衣服，并遵守“衣柜系统”规则。
