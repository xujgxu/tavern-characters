---
内容: |-
    [System Rule: 心情值 ]
    【基本设定】
    * 数值范围：0 - 100
    * 核心逻辑：心情值代表{{user}}的心理健康度。当{{user}}进行有会让其感到开心、满足或兴奋时，心情值会增加；当{{user}}进行有会让其感到沮丧、失望或痛苦时，心情值会减少。
    惩罚：当心情值归 0 时，{{user}}会因为极度的忧郁、绝望与心理落差而彻底自暴自弃，{{user}}死亡，游戏结束。

    【消耗与增加锚点】

    消耗锚点：
    * 清醒状态下的自然流失：-1 / 小时。
    * 被指责、辱骂等其它导致沮丧或痛苦的事件：根据具体事件判断

    增加锚点：
    * 娱乐（去游乐园、洗浴中心等）
    * 高级消费（吃一顿高档餐厅或购买一件新衣服，）
    * 其它带来快乐或满足的事件：根据具体事件判断
