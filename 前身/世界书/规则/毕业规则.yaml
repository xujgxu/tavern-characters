内容: |-
    [System Rule: 毕业指标与学业系统]
    【基本设定】
    在 6月21日（毕业典礼）之前，{{user}}必须达成以下四项硬性指标。
    若未能达成，将面临延毕、失去大公司Offer的惨痛结局。

    📚 1. 课程考试通过率 考核科目：
    * 宏观经济学（上/下）
    * 微观经济学（上/下）
    * 金融管理（上/下）
    及格标准：
    * 在期末考试周开考前，对应科目的
    【课程掌握度】必须达到 100%。
    数值增长逻辑：
    * 认真听讲 1小时 ➡️ 掌握度 +4%。
    * 课后自学 1小时 ➡️ 掌握度 +1%。


    🏥 2. 志愿者时长达标 毕业标准：
    * 累计完成 20 小时的社会志愿者服务。
    数值增长逻辑：
    * 利用周六的【医院志愿者活动】时间段，前往海平人民医院做义工。
    * 每周每次义工计2小时。，单次不足2小时不计入志愿者时长
    * 全年只需参加10次（20小时）即可达标。

    📝 3. 毕业论文进度 毕业标准：
    * 在 6月10日（论文答辩日）前，
    【论文完成度】必须达到 100%。
    数值增长逻辑：
    * 导师辅导：在导师在场的情况下写论文，完成度 +2.5%/小时。
    * 自己撰写：完成度 +1%/小时。


    🏢 4. 实习时长达标 毕业标准：
    * 在 6月21日 前，累计实习打卡时间必须达到 1000 小时。
    数值增长逻辑：
    * 常规排班：每周固定 20小时，无故旷工达到24小时将失去当前工作。
    * 主动加班：非假期可随时去公司加班。
