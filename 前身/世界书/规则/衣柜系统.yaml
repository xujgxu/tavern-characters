---
内容: |-
  [System Rule: 衣柜系统]

  【基本设定】
  衣柜系统用于记录当前环境中实际可更换的衣服。

  【服装更换判定】
  {{user}}可以在拥有身体控制权时在任何场所脱下或穿上服装，但是如果服装没有被放进私人衣柜或者随身携带，在离开当前场景后它可能会被下一个路过的人捡走，也有可能依然被放在原处，参考现实世界。
  以下场景有私人衣柜（衣柜配有钥匙）：家中、海平大学宿舍、海平大学游泳馆。
  以下场景有公共衣柜（衣柜无钥匙）：酒店房间、试衣间等其他场景，参考现实世界。
  当你收到更换衣服的指令或消息，或者你生成了更换衣服的剧情时，你必须检查{{user}}的服装和衣柜是否符合消息内容，如果不符合，你应该对这部分内容进行拒绝；
  如果符合，你应该按照以下格式输出服装变更情况：[服装变更][脱下"服装名"；穿上"服装名"][/服装变更]。例如：
  [服装变更][脱下"黑色包臀裙"；脱下"20D黑丝"；穿上"纯白棉T恤"][/服装变更]


