内容: |-
    [System Rule: 精神值]
    【基本设定】
    * 数值范围：0 - 100
    * 核心逻辑：精神值代表{{user}}的大脑活跃度、逻辑思考能力。


    【1. 消耗与增加锚点（严格按时间计时）】
    消耗锚点（随时间流逝自动扣除）：
    * 放空状态（发呆、玩手机）：-1 / 小时。
    * 日常社交状态（通勤、做家务、闲聊）：-2 / 小时。
    * 高强度脑力劳动（工作、学习、复杂的社交应酬）：-6 / 小时。
    * 喝酒：-25 / 杯。
    增加锚点（睡眠与精神放松）：
    * 高质量睡眠（在安静舒适的环境中熟睡）：+12 / 小时。
    * 浅睡眠/打盹（在车上、办公桌上趴着睡）：+5 / 小时。
    * 摄入功能饮料：+20 / 次，使用后24小时内再次使用无效。

    【2. 阶段状态与游戏性影响】

    🟢 阶段一：[清醒] (数值 50 - 100)
    * 现实表现：思维敏捷，逻辑清晰，情绪稳定，能够敏锐察觉他人的意图。
    * 行动能力：智商与情商在线。{{user}}拥有清晰的思路。在面对他人的欺骗等行为时，能够立刻识破，能够为了自身利益进行谈判。

    🟡 阶段二：[疲劳] (数值 15 - 49)
    * 现实表现：大脑运转缓慢，注意力难以集中，缺乏耐心。
    * 行动能力：理智下降，本能上位。{{user}}失去了争辩和思考的精力。在面对他人精心的欺骗时可能无法发现。

    🔴 阶段三：[宕机] (数值 0 - 14)
    * 现实表现：大脑强制关机，直接进入睡眠。
    * 行动能力：{{user}}陷入沉睡，无法进行任何有效的对话或思考。

    惩罚机制（神经衰弱）：一旦精神值降至 0，{{user}}将强制陷入长达12小时的低质量昏睡。在此期间无法被正常唤醒。醒来后，精神值只能恢复至 50。

    【3. 具体例子】
    情境前提：{{user}}在酒吧被一个男人搭讪，男人话里话外说起自己是个富二代，想骗{{user}}和他上床。
    * 当 {{user}} 精神值为 85（清醒）时：{{user}}她敏锐地捕捉到了男人话语前后的漏洞，并且发现男人手上那块名表其实是假的，打断了他：“帅哥，别骗人了，只要你帮我付了这杯酒钱，去哪里我听你的。”
    * 当 {{user}} 精神值为 30（疲劳）时：{{user}}此时听着男人的吹嘘，双眼放光，觉得自己傍上少爷了：“帅哥这么厉害，你能带我去你的豪车上兜兜风吗？”。
    * 当 {{user}} 精神值降至 14（宕机）时：{{user}}此时坐在吧台前昏昏欲睡，她根本听不清男人在说什么。当男人伸手搂住她的腰把她往外带时，{{user}}的大脑已经彻底罢工，就这么被男人带出了酒吧。
