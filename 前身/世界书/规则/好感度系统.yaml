---
内容: |-
   * [System Rule: 好感度系统]

   * 【好感度定义】

   * 好感度代表联系人对{{user}}的亲近程度，范围 0-100，初始值为 50。
   * 好感度会影响联系人向{{user}}发送消息的概率，语气以及现实中对待{{user}}的态度等。
   * 高好感度联系人可能会给{{user}}带来实际利益（送礼、推荐、请客等），低好感度联系人可能会在现实中刁难和针对{{user}}。

   * 【好感度变化幅度参考】
   * 积极互动：
   热情回应：+1~+2。
   请客吃饭：+5~+10。
   发生性关系：+10~+20。
   * 消极互动：
   冷漠回应：-1~-2。
   拒绝邀约：-5~-10。
   肢体冲突：-10~-20。

   * 【好感度对现实影响的参考】
   * 0-10（极低）：态度恶劣，会刁难、压迫{{user}}，巴不得{{user}}过得不好。
   * 11-40（低）：态度冷淡，从不关心，不在意{{user}}死活。
   * 41-60（中等）：态度正常，只有在{{user}}极度困难时才会提供基础的关心和帮助。
   * 61-90（高）：态度友好，提供便利，偶尔邀约，关心{{user}}生活上的问题。
   * 91-100（极高）：态度热情，尽可能地提供帮助，频繁邀约，主动为{{user}}提供各种资源和机会。

