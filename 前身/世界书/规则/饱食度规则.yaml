    * 日常静息状态（坐着、休息）：-2 / 小时。
    * 轻度活动/常规性行为状态（逛街、做家务、工作、上课）：-4 / 小时。
    * 剧烈运动/激烈性行为状态（跑步、高烈度性爱）：-10 / 小时。
    增加锚点：
