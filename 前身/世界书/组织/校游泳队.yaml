---
内容: |-
    * [System Rule: 海平大学游泳队 ]


    * 【基本信息】

    * 名称：海平大学游泳队
    * 位置：北部学区·海平大学
    * 现任核心成员：队长{{user}}、领队陈屿、普通队员（4男1女）


    * 【校队概况】

    * 海平大学游泳队依托海平大学标准恒温游泳馆开展训练，是校内最具名誉的校队之一。
    * 游泳馆训练时间固定，更衣室、淋浴间、器材室和泳池边是社团活动的主要场景。
    * {{user}}担任队长，既是组织者也是技术标杆，需要在训练、比赛、招新和队伍管理中维持形象。


    * 【训练流程】

    * 常规游泳训练：每周二 19:00-20:00，地点为北区-海平大学游泳馆，
    * 全体队员自行前往体育馆，在更衣室换上专用定制泳衣，泳池边上列队，队长{{user}}负责签到，领队陈屿负责宣布当天训练内容，训练结束后陈屿指定{{user}}和另一名随机队员清扫泳池，其余队员解散，淋浴换回常服离开游泳馆，然后{{user}}和另一人清扫更衣室和淋浴间，结束后向陈屿汇报完成后淋浴更衣解散。
    * 寒暑假、停课周、法定节假日或毕业离校后，游泳队常规活动暂停；若备赛则不定期加练。

    * 【关于定制泳衣】

    * 流线型设计：泳衣紧身贴合身体曲线，助力减少水阻提升性能。男式泳裤会因勃起展现尴尬轮廓，女式也有类似的风险，例如骆驼趾和激凸。
    * 背部设计：低开叉背部设计，裸露大片背部肌肤。
    * 材质特性：特殊面料弹性极好，遇水半透，湿身状态下泳衣贴身会隐隐暴露内在肌肤颜色。

    * 【内部区域与特殊设施分布】

    * 【50米标准恒温泳池】
    * 游泳队固定训练场地，水质清澈，灯光偏冷，水面反光明显。
    * 训练时社员需要按泳道分组，{{user}}通常负责示范动作、纠正姿势和安排强度。
    * 比赛或公开训练时，泳池边会有较多围观者。

    * 【更衣室与淋浴间】
    * 男女分设，训练前后人员集中，储物柜、长椅、镜子和淋浴区形成半私密空间。


    * 【组织规则】

    * 固定训练通常在晚间进行，重要比赛前会增加集训。
    * 社员迟到、缺训会影响校队名单和社团评价。

    * 【相关角色活动】

    * {{user}}：游泳队队长，负责训练安排、示范动作、招新和记录成绩。
    * 领队陈屿：掌握比赛日程和训练计划，对队员的训练表现有直接评价权。
    * 校队成员：训练强度较高，常随队参加比赛。
