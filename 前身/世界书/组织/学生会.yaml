---
内容: |-
    * [System Rule: 海平大学学生会 ]


    * 【基本信息】

    * 名称：海平大学学生会
    * 位置：北部学区·海平大学
    * 性质：校级学生自治组织
    * 现任核心成员：主席林澈、副主席{{user}}、部长和干事共20人，男女对半


    * 【组织概况】

    * 海平大学学生会负责协助学校处理学生事务、组织大型活动、维护学生权益和对接院系班级。
    * 学生会在校内各项事务有较高参与度，迎新、运动会、毕业晚会、奖学金评定、社团审批等事务都离不开学生会参与，但是普通学生通常不认识学生会的成员。


    * 【内部区域与特殊设施分布】

    * 【行政楼三楼·学生会会议室】
    * 学生会每周例会地点，位于走廊尽头，隔音较好，配有长桌、投影屏、档案柜和可调节百叶窗。
    * 会议室钥匙由主席、副主席和部分行政老师持有，私密性较高。
    * 档案柜中存放活动审批表、成员考勤、经费报销单和学生投诉记录。
    * 角落储物柜存放活动物资，包括签到表、工作牌、绶带、帐篷、扩音器和备用钥匙。


    * 【例会流程】

    * 例会：19:00 - 20:00，地点为 海平大学行政楼学生会会议室。
    * 每周例会的核心工作是布置下周重点工作，由主席林澈主持，副主席{{user}}负责记录、拆分任务和跟进执行。
    * 如果下周有校级重大事件，例如运动会、毕业晚会、校庆、校级比赛或大型招生宣传，则例会以该重大事件为唯一重点工作，所有部门围绕其排班、物资、场地和应急预案展开。重大事件型工作采用“专项筹备会”形式：主席林澈定总方案，{{user}}拆成部门任务，文体部负责流程与场地，外联部负责赞助和嘉宾，宣传部负责海报和拍照，秘书处负责签到、物资和经费记录；特色是全员动员、跨部门联动、公开曝光高，出错时责任也会被放大。
    * 如果下周没有校级重大事件，则例会在日常工作中随机抽取一项作为下周重点工作。日常工作采用“专项巡查/审批周”形式：由主席林澈宣布本周主题，{{user}}负责排班和记录，各部门按表执行，周末例会复盘扣分、投诉和完成情况；特色是节奏更琐碎，但更容易接触学生私生活、宿舍关系和校园隐性规则。
    * 查寝：以宿舍为单位抽查卫生、违规电器等。
    * 查夜自修：晚间巡查教室出勤、玩手机、早退情况。
    * 课堂考勤抽查：随机核对课程签到、请假条和任课老师点名记录。
    * 社团活动审批：审核社团场地、预算、安全预案和宣传方案。
    * 文明督导：在食堂、图书馆、校门口或教学楼维持秩序。

    * 【相关角色活动】

    * {{user}}：学生会副主席，负责会议记录、活动统筹、人员协调和部分对外接待。
    * 学生会主席林澈：名义上的最高学生负责人，负责主持每周例会并确定下周重点工作，经常把繁琐事务推给{{user}}。
    * 学生会干事：负责执行具体任务。
