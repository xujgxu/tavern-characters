---
内容: |-
    * [System Rule: 远洋环球物流亚太区总部 ]


    * 【基本信息】

    * 名称：远洋环球物流亚太区总部
    * 位置：市中心
    * 性质：{{user}}实习的跨国物流巨头企业


    * 【企业概况】

    * 工作时间：每周一至周五8:00-17:00，中午12:00-2:00为午休时间，加班按照正常时薪额外支付加班费。
    * 作为全球顶尖的跨国物流巨头，公司占据了CBD A座视野最开阔、租金最昂贵的顶层黄金地段（45-50层）。
    * 推行欧美式的扁平化管理，日常工作氛围相对轻松、自由。员工着装要求并不死板，上下级之间表面上倡导平等交流。
    * 人员高度国际化：汇聚了来自世界各地的精英，以及各个国家的业务骨干与外籍驻派人员。多语种交流是这里的常态。
    * 公司在南部工业区设有远洋环球物流仓储中心，作为亚太区物流网络的中转与分拨节点，由总部统一调度。
    * 公司内部等级森严，竞争极其激烈。实习生如{{user}}处于底层，需通过加班和业绩争取转正机会。


    * 【内部区域与特殊设施分布】

    * 【50层：大中华区高管行政层】
    * 总裁办公室：位于走廊尽头，270度无死角全景落地窗，可俯瞰整个海平市。室内铺设极厚地毯，配有宽大实木办公桌、真皮沙发，以及一扇通往私人休息室（内含独立卫浴）的隐形门。采用最高级别隔音材质。
    * 高级会议室：长条形红木会议桌下方铺有垂坠至地面的厚重桌布。玻璃墙配备一键雾化功能（智能调光玻璃），可瞬间阻挡外部视线。

    * 【49层：核心业务与数据中心 】
    * 中央机房与档案库：仅专业检修人员可进入。恒温恒湿密闭空间。高大服务器机柜和密集型档案架形成许多狭窄深邃的过道。设备运行产生持续低频嗡嗡声，环境音嘈杂，且存在多处监控探头死角。

    * 【48层：员工福利与休闲区 】
    * 全景茶水间：采光极佳，吧台设计较高，配有高脚凳和半包围式卡座。最深处角落摆放大型自动贩卖机和双开门冰箱，形成相对隐蔽的L型空间。
    * 睡眠舱与减压室：照顾跨国倒时差员工。内部光线昏暗，有数个半封闭式隔音睡眠舱，以及几间带有内部反锁功能的独立冥想室。
    * 健身房和更衣室：对所有员工开放。除常规器械外，配备宽敞的单人淋浴间和带有长条长椅的私密更衣室。

    * 【45-47层：开放式办公区】
    * 工位区：采用低矮挡板的开放式工位，视野开阔。
    * 文印与耗材室：每楼层均有一间独立小型文印室，堆放成箱A4纸和备用墨盒。大型复印机工作时发出规律机械运转声。
    * 消防安全通道：贯穿45至50层的内部水泥楼梯。因公司有专用穿梭电梯，推拉式重型防火门后的楼梯间常年无人问津，回音极大且无监控。
    * 部门经理办公室：中层领导专属空间，分布在每层开放办公区核心位置。朝向员工区为全透明落地玻璃隔断，方便经理监督工作状态，但玻璃内侧配有可手动调节角度的重型百叶窗。



    * 【相关角色活动】

    * {{user}}：大四实习生，在45-47层开放式办公区工作。实习转正是她目前最重要的目标之一。公司内部的阶级森严和竞争压力是她日常面临的主要挑战。
    * 部门主管张经理：{{user}}的直接上级，40岁左右，对{{user}}有超越上下级的兴趣。其办公室位于47层，配有可调节百叶窗的玻璃隔断。
    * 人力资源部：位于A座38层（不在本条目范围内），负责实习生管理和转正评估。
    * 其他实习生：与{{user}}同期或不同期的实习生群体，竞争激烈。
