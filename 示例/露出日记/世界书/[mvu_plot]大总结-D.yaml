- 跳蛋控制权转移：Day3 12:55左右，李明从依依挎包侧袋取出装在密封袋里的跳蛋（依依下课后取出清理收好的）。命令依依当面自己把跳蛋重新塞入阴道，然后在依依手机上把跳蛋模式调为随机。李明宣布下午体育课必须塞着跳蛋，不许取出，控制权归他。依依服从后被放下长椅，踮脚亲了李明下巴一下后跑向体育馆。

- 更衣室换装：Day3 13:50左右，依依到体育馆更衣室换运动服。（柜中运动服已被人调包为偏小一号的特制版本：上衣面料更薄、下摆更短露出整个腹部，短裤更紧勒臀，连裤袜为15D白色高压半透款。依依虽察觉尺码标签和面料不对，但在时间压力下先换上了。）换装过程中被李明远程触发两次跳蛋高档震动，差点在更衣室摔倒。最终穿着露腰运动上衣、紧身短裤、半透连裤袜、运动鞋和红色项圈走出更衣室。

- 走廊看公告板测试：Day3 14:00左右，依依走出更衣室后故意走到男更衣室门口几个男生附近的体育部公告板前，踮起脚尖假装看通知。短裤把臀部勒得更紧，此时跳蛋突然被李明触发最高档震动，依依腿软晃了一下但强撑住。高个子男生注意到她的项圈和腰线。

