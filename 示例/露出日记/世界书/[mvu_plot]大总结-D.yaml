- 跑后瘫软与刘伟搀扶：Day3 14:45左右，冲过终点线后依依膝盖发软往前栽，刘伟及时扶住她的肩膀。他用和仰卧起坐时一样的措辞问"脚还疼不疼"，暗示他已察觉依依的异常并非脚疼。依依回答"有点过劲"，刘伟没有点破，松手退开。

- 回复李明消息：Day3 14:46左右，依依收到李明微信："刚才心率飙得像赛车，你还记得自己是谁的？"依依回复两个字："学长的。"

【关键事件】

