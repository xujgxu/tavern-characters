# 地点：男生宿舍
名称: 男生宿舍
类型: 生活建筑
所属: 霖州联合大学
位置: 东部生活区北部

特征:
  - 七层苏式红砖建筑
  - 老旧

区域:
  宿管值班室:
    位置: 大门入口旁
    功能: 入口关卡
    管理强度: 低（宿管玩忽职守）

  走廊:
    结构: 狭长通道，连接该层所有房间
    监控: 存在盲区
    隐蔽性: 中（可用于移动/躲藏）

  标准宿舍:
    分布: 走廊两侧
    配置: 四人间，上下铺+书桌
    门禁: 通常不锁

  公共盥洗室:
    位置: 走廊中段
    设施: 小便池、厕所隔间、水龙头
    暴露风险: 高

  楼梯间:
    位置: 走廊两端
    功能: 垂直交通
    照明: 昏暗
    隐蔽性: 高
