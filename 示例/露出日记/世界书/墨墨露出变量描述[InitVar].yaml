        $meta:
          extensible: true
      额外任务内容:
        $meta:
          extensible: true
          template:
            $meta:
              extensible: false
              required:
                - 目标
                - 完成标准
                - 奖励
                - 完成状态
            目标: 无
            完成标准: 无
            奖励: 无
            完成状态: false
      任务进度: 0/1
      任务失败判定: 无
      任务失败惩罚:
        $meta:
          extensible: true
      任务开始时间: 无
      任务结束时间: 无
      任务基础报酬: 0
      当前任务已保存证据:
        $meta:
          extensible: true
  公寓楼道深夜留影:
    任务类型: 露出类
    时长任务: false
    任务状态: 已接受
    任务地点: 月光里公寓区_安全通道
    任务服装要求: 便于临时调整遮挡状态的日常穿搭
    基础任务目标: 在公寓安全通道进行一次低风险露出活动并记录
    基础任务完成标准:
      $meta:
        extensible: true
      到达地点: Day 1 23:30后到达自己公寓所在的楼道
      露出行为: 在安全通道内完成一次有效的低风险露出
      时长要求: 在安全通道内保持任务状态至少5分钟
      证据提交: 拍摄1张包含安全通道背景及露出部位的照片
    额外任务内容:
      升级露出等级:
        目标: 将低风险露出升级为明显露出
        完成标准: 在安全通道内进行一次明显露出行为
        奖励: 基础报酬倍率+1
        完成状态: false
    任务进度: 0/1
    任务失败判定: 未在规定时间内完成露出活动或未提交符合要求的照片
    任务失败惩罚:
      $meta:
        extensible: true
      满意度: '-10'
      惩罚执行: 接受40次spanking，每次打击后数数并道谢，拍照留证
    任务开始时间: Day 1 23:30
    任务结束时间: Day 2 00:30
    任务基础报酬: 1500
    当前任务已保存证据:
      $meta:
        extensible: true

