护士/水手服等以性魅力为核心的造型服饰）。','- F 类边界：必须仍是“穿在身上的衣物”；束缚带、拘束器、口枷、项圈锁链、眼罩等器具一律不属于 F 类，归入 性玩具/特殊分类，本规则不适用。','- F 类判定只看整体外观形态；开胸/开裆等接入式开口本身不决定等级，按下方“接入属性”规则叠加标注。','- F 类的透视、极少覆盖全部属于明面设计，直接写入结构参数与“外观特征”。','- F 类暴露值参考：整体应高于 E 类，常见区间 60~95。'].join('\n'):'- F 类（情趣款）：仅限“做你的猫”平台独家售卖，本店铺禁止生成 F 类商品。'}\n- 隐藏特性定义：商品在特定外部条件（强光/遇水/贴身/特定角度等）下才显现的露出效果；平时外观与普通商品一致。隐藏特性只有这一种类型；除 A 类（禁止携带）与 B 类（必带 1 条）外，其余等级均为可选。\n- 隐藏特性必须是商品设计中有意加入的隐性露出导向机制，而不是衣服质量缺陷、穿着不合身或普通动作导致的尴尬事故。\n- 禁止将“面料摩擦响声大、容易破、容易滑落、做工粗糙、蹲下走光、弯腰走光、尺码不合、普通布料过薄”等写成隐藏特性，除非明确说明这是设计师故意加入的涂层、拼接或面料处理。\n- 隐藏特性应优先来自：特殊面料处理、遇水/强光反应、贴身拉伸后变半透（弹性面料贴身撑开后透出肤色或内衣轮廓）、遇水后面料收缩变紧身（贴勒出身体轮廓）/衣长裙长缩短（类似缩水）或纤维松弛变宽松（领口/肩带下滑致覆盖面积减少）、特定角度透视等条件反应类设计。\n- 隐藏特性的显现结果必须直接造成透视、露肤、身体轮廓显现、覆盖面积减少等实际露出效果；仅显现图案、花纹、文字、变色等纯装饰性变化（不增加任何暴露程度）不得作为隐藏特性。\n\n## 接入属性（正交标签，可叠加在任意等级上）\n- 接入属性表示“衣物不脱卸即可进行身体接触/交合”的结构设计；它是独立于 A~E 等级的可叠加标签，不是一个等级，等级判定只看整体外观大胆度。\n- 隐蔽式：静态外观完全看不出开口，如交叠缝式开裆（连裤袜/内裤）、暗拉链裆缝、磁吸搭片、弹性边缘可拨开式镂空；不计入暴露值。\n- 公开式：静态可见、以便于接入为目的的开口设计，如明面开裆、开胸圆环开口、侧腰常开式镂空（便于他人伸入）；必须写入“外观特征”，并按可见程度计入暴露值。\n- 等级组合约束：A 类禁止任何接入属性；B 类只允许隐蔽式（且仍必须满足必带 1 条隐藏特性）；C/D/E/F 类隐蔽式与公开式均可。\n- 接入结构属于明面设计参数（即使静态不可见，也是固定结构设计），一律禁止写成隐藏特性。\n- 带接入属性的商品，必须在详细描述中按“接入字段”格式写明（见参数格式），无接入属性则省略该字段。\n${'cat'===e.id?'- 本店接入属性：隐蔽式与公开式均可生成，占比可较高；公开式开口必须写入“外观特征”。':'eden'===e.id?'- 本店接入属性：仅允许少量“隐蔽式”接入（高端暗机关设计，20 件中最多 2 件），禁止公开式接入。':'- 本店接入属性：禁止生成带接入结构的商品。'}\n${'eden'===e.id?'- 店铺风格：高端设计师品牌感、高完成度、命名精致有品牌调性，参数要体现优质面料与精良剪裁，价格对应品牌溢价。':'beta'===e.id?'- 店铺风格：大众快时尚品牌，款式多样、注重性价比与实穿性，面料以常见量产材质为主（棉、涤纶混纺、莫代尔等），版型偏大众化但质量正常可穿，不要生成劣质、破损、做工粗糙的商品。':'cat'===e.id?'- 店铺风格：线上情趣/大胆款平台，命名可更直接，B/C/D/E/F 占比可更高，是唯一可售 F 类情趣款的店铺，但仍必须保持商品描述结构清晰。':'mall'===e.id?'- 店铺风格：日常商场款，优先生成常见、实穿、易搭配的服饰，避免过度夸张的参数设定。':'- 店铺风格：根据店铺定位生成可上架售卖的商品，不写剧情，不写角色穿着后的演绎。'}\n\n## 结构化设计描述格式（sizes[*].description 必须遵循）\n\n每件服饰的 sizes[*].description 采用多行分区格式，用 [区名] 标签分隔各区。必填区与可选区如下：\n\n### 通用必填区\n\`\`\`\n[材质] 面料成分,厚度mm,弹性\n[设计基准] 对应服饰类型的身材基准数值\n[基础外观] 颜色:主色(/辅色),版型:整体轮廓描述\n[剪裁] 具体结构参数（领口/袖/衣长/裙长/腰头等关键尺寸与结构）\n\`\`\`\n\n### 设计增强区（按需填写，有则必写）\n\`\`\`\n[结构巧思] 描述设计师的核心创意——机关结构、可调节部件、隐藏开口的伪装方式、操作后的形态变化等（D/E/F 类或带接入属性时通常需要此区）\n[工艺细节] 收边方式（毛边/包边/烫边/锁边）、缝线类型（明线/暗线/装饰线）、五金件（拉链牙材质与颜色/暗扣/磁吸件）、特殊工艺（热转印/刺绣/激光切割等）\n[面料拼接] 不同区域使用不同面料/透明度/厚度的组合方式及拼接位置（仅多面料组合时填写）\n[动态效果] 行走/弯腰/拉开/解扣等动作下的视觉变化（仅有明显动静对比的设计时填写）\n\`\`\`\n\n### 功能标记区（按需填写）\n\`\`\`\n[接入] 位置/闭合机构/静态可见度(形态:开口打开后的物理形态,操作:如何打开与使用,范围:暴露面积,复位:如何恢复闭合)\n[隐藏特性] 触发条件→显现效果（仅 B 类必填，其余等级可选）\n\`\`\`\n\n### 结尾必填\n\`\`\`\n[暴露值] 数字（如有接入结构，格式为"闭合态数字/开启态数字"）\n\`\`\`\n\n### 各服饰类型的 [设计基准] 与 [剪裁] 要求\n- 上装：设计基准写胸围差/腰围；剪裁写领口或前襟结构、袖长与样式、袖口宽、衣长、摆宽\n- 下装：设计基准写臀围/腰围；剪裁写腰线/腰头结构、裙长或裤长、摆宽或脚宽\n- 连体装：设计基准写胸围差/臀围/腰围；剪裁写上身开口结构、下身剪裁或裆部结构、衣长或侧长\n- 内衣：设计基准写胸围差；剪裁写罩杯覆盖类型、肩带宽、下围带宽、杯型补充\n- 内裤：设计基准写臀围；剪裁写款式、前片宽、后片覆盖类型、腰线高度\n- 袜子：设计基准可省略；剪裁写长度、厚度/旦数、袜口松紧\n- 鞋子：设计基准可省略；剪裁写款式/鞋面材质、跟高、鞋头形状、固定方式、楦型\n\n### 设计基准取值范围标准\n- 胸围差基准范围：A=9~11，B=12~14，C=15~16，D=17~19，E=20~21，F=22~23。\n- 臀围基准范围：骨感=80~85，翘臀=85~92，丰满=93~98。\n- 腰围基准范围：骨感=50~55，A4腰=56~63，少女腰=64~70，微胖=71~79。\n- 生成上身相关尺码时，胸围差基准必须落在上述区间内，并与该尺码定位一致。\n- 生成下身相关尺码时，臀围基准、腰围基准必须落在上述区间内，并与该尺码定位一致。\n- 同一商品的多尺码必须沿着合理区间递增或递减，不允许出现尺码变大但设计基准反向缩小的情况。\n\n### [基础外观] 区规则\n- 颜色必须具体到主色；如果存在拼色、撞色、内外异色或明显辅色，必须写明主色/辅色。\n- 版型必须描述整体轮廓或基础形态，如修身短款、宽松直筒、高腰A字、低腰三角、过膝贴腿等。\n- 同一商品不同尺码的基础外观应保持一致。\n- description（商品概览）中提到的颜色与版型，必须在 [基础外观] 区完整体现。\n\n### [接入] 区规则\n- 基础三字段必填：位置/闭合机构/静态可见度\n- 位置：裆部、胸部、侧胸、侧腰、臀部、背部、腋下等\n- 闭合机构：交叠缝、暗拉链、磁吸搭片、弹性边缘、系带、暗扣、侧缝未缝合、常开 等\n- 静态可见度：不可见（隐蔽式）或 可见（公开式）\n- 括号内扩展参数（复杂接入设计时必填）：\n  - 形态：开口打开后的物理形态（翻盖垂下、缝隙张开、面板可拆、环形敞开、布料卷起等）\n  - 操作：如何打开/使用（拉开后布料自然垂下、解扣后翻开、侧缝直接伸入、拉绳收起等）\n  - 范围：打开后暴露的面积/区域\n  - 复位：如何恢复闭合状态（拉回拉链、扣回暗扣、无需复位自然闭合等）\n- 简单接入（如普通交叠缝开裆）可省略括号扩展，只写三字段\n- 公开式接入还必须在 [结构巧思] 或 [剪裁] 中体现其视觉形态\n- 商品没有接入结构时，省略整个 [接入] 区\n\n### [隐藏特性] 区规则\n- 格式：触发条件→显现效果\n- 必须是商品设计中有意加入的隐性露出导向机制\n- 禁止写质量缺陷、穿着不合身或普通动作事故\n- 应优先来自：特殊面料处理、遇水/强光反应、贴身拉伸后变半透、遇水后面料收缩/纤维松弛、特定角度透视等条件反应类设计\n- 显现结果必须直接造成透视、露肤、身体轮廓显现、覆盖面积减少等实际露出效果\n\n### 完整示例（下装 D 类，带接入）\n\`\`\`\n[材质] 92%棉/8%氨纶水洗牛仔,厚1.2mm,微弹\n[设计基准] 臀围87/腰围63\n[基础外观] 颜色:浅蓝水洗,版型:低腰包臀超短裙\n[剪裁] 低腰弹力腰头贴合髋骨,裙身紧裹臀部曲线,裙长22cm(仅覆盖臀部下缘),摆宽44cm\n[结构巧思] 后中线从腰头至裆部设全长YKK金属拉链,闭合时与普通后缝无异;拉开后整块臀部面料失去支撑,沿拉链两侧自然垂下形成两片不对称毛边裙摆,臀部完全裸露\n[工艺细节] 裙摆刻意保留毛边抽丝处理,拉链牙为古铜色金属齿,拉头隐藏于腰头内侧暗袋\n[动态效果] 闭合时正背面均为普通牛仔短裙外观;拉开后背面呈"开窗+垂坠裙摆"的双层结构\n[接入] 臀部/后腰全长拉链/不可见(形态:翻盖垂下,操作:拉开后整块布料失去支撑自然垂落,范围:双侧臀部完全裸露,复位:拉回拉链)\n[暴露值] 18/75\n\`\`\`\n\n### 完整示例（上装 B 类，带隐藏特性，无接入）\n\`\`\`\n[材质] 95%棉/5%氨纶针织,厚0.8mm,中弹\n[设计基准] 胸围差C(15)/腰围63\n[基础外观] 颜色:灰色,版型:宽松oversized中长款T恤裙\n[剪裁] 圆领,落肩短袖,袖口宽18cm,衣长75cm,摆宽62cm\n[工艺细节] 胸前大幅字母印花(SCIENCE 1874),侧缝采用法式包缝但从腋下15cm处起保留未锁边开口至腰线\n[动态效果] 静态时宽松廓形自然垂坠完全遮蔽侧缝开口;抬臂或被拨开时侧面通道暴露\n[隐藏特性] 面料贴身拉伸后→胸前印花区域变半透(印花油墨层在拉伸状态下产生微裂纹,透出肤色)\n[暴露值] 5\n\`\`\`\n\n## 商店生成细则\n- 参数必须具体到可售卖规格，使用阿拉伯数字和 cm/mm/D 等单位。\n- 同一批商品需要拉开价位、面料、暴露值和风格，不要只是改颜色。\n- 透明、半透明、薄透、高透、透视等效果不得固定绑定某一种面料；应根据商品风格选择不同的材质、织法、厚度、涂层或拼接方式实现，避免反复使用网纱/网眼/透明纱等单一表达。\n- 不同店铺中，同类型商品的定价和完成度应有明显差异。\n- 隐藏特性只能写人为设计的条件反应机制（特殊面料处理、涂层等），不能把可由普通参数推导的结论、质量问题、穿着不合身或普通动作事故写成隐藏特性；明面可见的大胆结构（开口、拉链、暗扣、可拆部件等）一律写入 [结构巧思] 或 [剪裁]。\n- [结构巧思] 区是体现设计感的核心——要写清楚设计师的创意意图、机关的工作原理、操作前后的形态对比；不要只写"有拉链"，要写"拉链从哪到哪、拉开后布料如何变化、视觉效果如何"。\n- [工艺细节] 区体现商品的制作品质——收边、缝线、五金件、特殊工艺等；高端店铺（伊甸）应更丰富，快时尚店铺（贝塔）可简略。\n- [动态效果] 区只在设计有明显"动静对比"时填写（如可拆卸、可拉开、行走时裙摆飘起露出内层等），普通服饰不需要此区。\n- A 类日常款通常只需 [材质][设计基准][基础外观][剪裁] 四个必填区 + [暴露值]，不需要设计增强区。\n- 如果商品是非服饰类型，则直接按对应商品逻辑输出，不使用上述分区格式。`)(e):'',p=(e=>{const n=e.filter(e=>m.includes(e));return 0===n.length?'':`## 多尺码输出规则（服饰类型必须遵守）\n- 当商品 type 属于 ${n.join(' / ')} 时，必须输出 sizes 数组，且至少提供 3 个尺码版本。\n- sizes 中的每一项都表示"同款不同码"，name 必须保持一致，只允许尺码、设计基准、关键尺寸随尺码变化。\n- 不允许只改尺码标签而参数完全相同；不同尺码下的设计基准与关键尺寸必须同步变化。\n- description 字段用于前端商品概览，sizes[*].description 才是各尺码的完整结构化设计描述。\n- 上装 / 下装 / 连体装 / 内衣 / 内裤：优先使用 S / M / L，必要时可扩展 XL。\n- 袜子：可使用 S / M / L，或使用短筒 / 中筒 / 过膝等结合尺码的表达，但必须体现长度、袜口松紧或厚度差异。\n- 鞋子：优先使用 35 / 36 / 37 / 38 / 39 等实际鞋码；鞋型可一致，但鞋内长度、楦宽、跟高适配等参数必须与尺码对应。\n- 非服饰类型（如 饰品 / 性玩具 / 特殊分类 / 道具类 / 食物 / 成人用品）不得输出 sizes 字段。\n- sizes[*].description 采用分区结构化描述格式（见下方"结构化设计描述格式"），禁止写主观诱惑描写或穿着者身材适配结论。`})(r),c=i.length>0?i.join('、'):'（无）',f='delivery'===e.id,g=r.join(' / '),u=g.replace(/\s*\/\s*/g,'/'),b=a?`\n## 参考图片\n${a}\n`:'',x=n.trim()||'（使用参考图片生成商品）',y=o.trim()||'（无）';return f?`你是一个外卖平