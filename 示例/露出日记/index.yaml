          <meta name="viewport" content="width=device-width,initial-scale=1" />
          <title>SillyTavern 预设绑定正则 · 功能介绍</title>
          <meta name="color-scheme" content="light dark" />
          <style>
            :root{
              --bg: #0b0c10;
              --panel: #111218;
              --text: #e9e9ee;
              --muted: #a4a6b0;
