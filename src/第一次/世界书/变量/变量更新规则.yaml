---
变量更新规则:
  世界:
    时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 参考「时间推进机制」更新
    地点:
      format: 区域_具体地点
      check:
        - 参考「地点机制」和「交通机制」更新
  主角:
    饱食度:
      type: number
      range: 0~100
      check:
        - 参考「饱食度机制」更新
    精神值:
      type: number
      range: 0~100
      check:
        - 参考「精神值机制」更新
    心情值:
      type: number
      range: 0~100
      check:
        - 参考「心情值机制」更新
    金钱:
      type: number
      check:
        - 参考「金钱机制」更新
    性欲值:
      type: number
      range: 0~100
      check:
        - 参考「性欲值与快感值」更新
    快感值:
      type: number
      range: 0~100
      check:
        - 参考「性欲值与快感值」更新
  APP:
    等级:
      type: number
      range: 1~5
      check:
        - 参考「牝多多APP」更新，1元=1EXP
    经验值:
      type: number
      check:
        - 参考「牝多多APP」更新
    已完成任务数:
      type: number
      check:
        - 每完成一个任务+1
    当前任务:
      type: object
      check:
        - 主角接取新任务时更新，任务完成或放弃时清空
  学业:
