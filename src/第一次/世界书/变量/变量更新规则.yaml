---
变量更新规则:
  世界:
    时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 每次事件推进、休息或场景转场后更新，保持时间流逝合理
        - 若场景跳转跨度较大，应说明跳跃原因
  主角:
    饱食度:
      type: number
      range: 0~100
      check:
        - 进食、购买食物后增加 ±(10~30)，根据进食量调整
        - 随时间推移和活动消耗逐渐减少，每小时约下降 3~8
        - 长时间不进食会持续下降
        - 饱食度过低（<20）会影响精神状态和行动能力
    精神值:
      type: number
      range: 0~100
      check:
        - 休息、娱乐、社交互动后增加 ±(5~15)
        - 学习压力、负面事件、长时间活动后减少 ±(5~15)
        - 精神值过低（<20）会影响判断力和社交表现
        - 饱食度低于 20 时精神值额外加速下降
