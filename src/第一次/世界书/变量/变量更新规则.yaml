---
变量更新规则:
  世界:
    时间:
      format: YYYY-MM-DD HH:MM
      check:
        - 根据行为累加时间。单次 AI 回复覆盖的时间跨度通常为 3~15 分钟（短对话）、30~60 分钟（一节课/一顿饭），睡眠行为不受上限限制
        - 参考「时间推进机制」文件中的行为时间映射表累加时间
        - 若场景跳转跨度较大（如跳过一整天），必须在 Analysis 中说明原因
  主角:
    饱食度:
      type: number
      range: 0~100
      check:
        - 每游戏小时自然消耗：清醒时 -4~6 / 睡眠时 -2。实际消耗量需参考「饱食度机制」文件中的活动消耗加成表
        - 进食恢复量：正餐（食堂套餐）= +32~38，简餐（面包/三明治）= +16~22，零食 = +6~10，外卖/餐厅 = +35~42，便利店便当 = +22~28
        - 饱食度不可超过 100（硬上限）
        - 饱食度 < 15 时角色出现明显饥饿症状，AI 需在叙事中体现
    精神值:
      type: number
      range: 0~100
      check:
        - 每游戏小时自然恢复：无所事事/放松时 +3~6，睡眠时 +5~8
        - 活动消耗：上课 -4~7（每节课），自习/写作业 -5~10（每小时），社交受挫 -8~15（每次）
        - 活动恢复：愉快社交 +5~12，运动/散步 +3~8，娱乐（看剧/打游戏）+5~10（每小时）
        - 饱食度 < 15 时精神值额外每小时 -2~4
        - 精神值 < 15 时角色出现明显疲惫症状，AI 需在叙事中体现
