    - 正则名称: "[折叠]变量更新中"
      id: ea96523f-a1cc-4634-b9d2-f28531adca6c
      启用: true
      查找表达式: /<update(?:variable)?>(?!.*<\/update(?:variable)?>)\s*(.*)\s*$/gsi
      内容: |-

        <details>
        <summary>变量更新中{{random::.::..::...}}</summary>
        $1
        </details>
      来源:
        用户输入: true
        AI输出: true
      作用于:
        仅格式显示: true
        仅格式提示词: false

    - 正则名称: "[折叠]完整变量更新"
      id: 06dec31f-c0a9-456c-8b88-1f9176a73039
      启用: true
      查找表达式: /<update(?:variable)?>(?!\s*<\/update(?:variable)?>)([\s\S]*?)<\/update(?:variable)?>/gsi
      内容: |-

